<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>XV Sara Sofía</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --gold: #c9a96e;
      --gold-light: #e8d5a3;
      --gold-dark: #8a6a35;
      --cream: #fdf8f0;
      --dark: #1a1209;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--dark);
      color: var(--cream);
      font-family: 'Cormorant Garamond', serif;
      overflow-x: hidden;
    }

    /* ══ PRE-PANTALLA ══ */
    #pre-pantalla {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background-image: url('CELEDONIOYANAOSPINA.webp');
      background-size: cover;
      background-position: center;
      display: flex;
      justify-content: center;
      align-items: center;
	  padding-top: 530px;
      transition: opacity 1s ease;
    }
    #pre-pantalla::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.10);
    }
    #btn-abrir {
      position: relative;
      z-index: 2;
      padding: 20px 52px;
      font-family: 'Montserrat', sans-serif;
      font-size: 20px;
      font-weight: 300;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: #fff;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.7);
      cursor: pointer;
      transition: all 0.4s ease;
      backdrop-filter: blur(6px);
      animation: fadeUp 2.2s ease forwards;
      opacity: 0;
    }
    #btn-abrir:hover {
      background: rgba(201,169,110,0.25);
      border-color: var(--gold-light);
      letter-spacing: 8px;
      color: var(--gold-light);
    }
    @keyframes fadeUp {
      0%   { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    #pre-pantalla.oculta { opacity: 0; pointer-events: none; }

    /* Cortina */
    #cortina {
      position: fixed;
      inset: 0;
      background: #000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s ease;
      z-index: 9998;
    }
    #cortina.activa { opacity: 1; }

    /* ══ CONTENIDO ══ */
    #contenido { opacity: 0; transition: opacity 1s ease; }
    #contenido.visible { opacity: 1; }

    /* ══ SECCIONES FOTO ══ */
    .seccion-foto {
      width: 100%;
      line-height: 0;
    }
    .seccion-foto img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* ══ SECCIONES CON FONDO ANIMADO ══ */
    .seccion-animada {
      position: relative;
      width: 100%;
      overflow: hidden;
    }
    .fondo-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }
    .fondo-overlay {
      position: absolute;
      inset: 0;
      background: rgba(10,6,2,0.45);
      z-index: 1;
    }
    .seccion-animada .contenido-seccion {
      position: relative;
      z-index: 2;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 20vh;
      padding: 10px 20px;
	  margin: 0 0 0 0;
    }
    .img-contenido {
      max-width: 900px;
      width: 100%;
      height: 100%;
      display: block;
      margin: 0 auto;
	  padding 10px;
    }

    /* ══ CUENTA REGRESIVA ══ */
    #countdown {
      background: var(--dark);
      min-height: 20vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 80px 20px;
      position: relative;
      overflow: hidden;
    }
    #countdown::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, rgba(201,169,110,0.08) 0%, transparent 70%);
    }
    .cd-ornamento {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(11px, 2vw, 14px);
      letter-spacing: 8px;
      color: var(--gold);
      text-transform: uppercase;
      font-style: italic;
      margin-bottom: 14px;
    }
    .cd-titulo {
      font-family: 'Playfair Display', serif;
      font-size: clamp(36px, 8vw, 80px);
      color: var(--cream);
      font-weight: 400;
      margin-bottom: 10px;
    }
	  .conf-titulo {
	  font-family: 'Playfair Display', serif;
      font-size: clamp(36px, 8vw, 80px);
      color: #000000;
      font-weight: 400;
      margin-bottom: 10px;
    }  
    .cd-fecha {
      font-family: 'Montserrat', sans-serif;
      font-size: clamp(10px, 1.8vw, 13px);
      letter-spacing: 5px;
      color: var(--gold-light);
      text-transform: uppercase;
      margin-bottom: 70px;
    }
    .cd-grid {
      display: flex;
      gap: clamp(16px, 4vw, 56px);
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 60px;
    }
    .cd-bloque {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .cd-numero {
      font-family: 'Playfair Display', serif;
      font-size: clamp(56px, 13vw, 120px);
      color: var(--cream);
      line-height: 1;
      min-width: clamp(80px, 14vw, 140px);
      text-align: center;
      position: relative;
    }
    .cd-numero::after {
      content: '';
      position: absolute;
      bottom: -6px;
      left: 50%;
      transform: translateX(-50%);
      width: 36px;
      height: 1px;
      background: var(--gold);
    }
    .cd-label {
      font-family: 'Montserrat', sans-serif;
      font-size: clamp(9px, 1.4vw, 11px);
      letter-spacing: 4px;
      color: var(--gold);
      text-transform: uppercase;
      margin-top: 14px;
    }
    .cd-sep {
      font-family: 'Playfair Display', serif;
      font-size: clamp(40px, 8vw, 80px);
      color: var(--gold);
      align-self: flex-start;
      margin-top: clamp(8px, 2vw, 16px);
      opacity: 0.4;
    }
    .cd-terminado {
      font-family: 'Playfair Display', serif;
      font-size: clamp(28px, 6vw, 56px);
      color: var(--gold-light);
      font-style: italic;
    }

    /* ══ SLIDESHOW ══ */
    #slideshow {
      background: #0d0904;
      min-height: 20vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 80px 20px;
    }
    .slide-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(11px, 2vw, 13px);
      letter-spacing: 8px;
      color: var(--gold);
      text-transform: uppercase;
      font-style: italic;
      margin-bottom: 48px;
    }
    .slide-wrap {
      position: relative;
      width: 100%;
      max-width: 680px;
      aspect-ratio: 4/5;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(0,0,0,0.7);
    }
    .slide-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 1.4s ease;
    }
    .slide-img.activa { opacity: 1; }
    .slide-dots {
      display: flex;
      gap: 12px;
      margin-top: 32px;
    }
    .slide-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(201,169,110,0.25);
      cursor: pointer;
      border: none;
      transition: all 0.3s ease;
    }
    .slide-dot.activo {
      background: var(--gold);
      transform: scale(1.5);
    }
	/* ══ CONFIRMACIÓN ══ */
#confirmacion {
  background-image: url('fondo animado.webp');
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px 20px;
  position: relative;
}

#confirmacion::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at center, rgba(201,169,110,0.06) 0%, transparent 70%);
}

#btn-confirmar {
  position: relative;
  z-index: 2;
  padding: 18px 52px;
  font-family: 'Montserrat', sans-serif;
  font-size: 13px;
  font-weight: 300;
  letter-spacing: 6px;
  text-transform: uppercase;
  color: #000000;
  background: transparent;
  border: 1px solid rgba(201,169,110,0.6);
  text-decoration: none;
  cursor: pointer;
  transition: all 0.4s ease;
  backdrop-filter: blur(4px);
}

#btn-confirmar:hover {
  background: rgba(201,169,110,0.15);
  border-color: var(--gold);
  letter-spacing: 8px;
  color: var(--gold);
}

    /* ══ BOTÓN AUDIO FLOTANTE ══ */
    #audio-btn {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 1000;
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: rgba(201,169,110,0.12);
      border: 1px solid rgba(201,169,110,0.35);
      color: var(--gold-light);
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(8px);
      transition: all 0.3s ease;
      opacity: 0;
      pointer-events: none;
    }
    #audio-btn.visible { opacity: 1; pointer-events: all; }
    #audio-btn:hover { background: rgba(201,169,110,0.28); border-color: var(--gold); }

    @media (max-width: 600px) {
      .cd-sep { display: none; }
      .slide-wrap { aspect-ratio: 3/4; }
    }
  </style>
</head>
<body>

<!-- PRE-PANTALLA -->
<div id="pre-pantalla">
  <button id="btn-abrir" onclick="abrirInvitacion()">ABRIR INVITACIÓN</button>
</div>
<div id="cortina"></div>

<!-- CONTENIDO PRINCIPAL -->
<div id="contenido">

  <!-- 1. PORTADA -->
  <section class="seccion-foto">
    <img src="https://drive.google.com/thumbnail?id=1cAXPU8qw8FvoPsV9yGo8SAiko25dBCGr&sz=w1600" alt="Portada"/>
  </section>

  <!-- 2. FOTOGRAFÍA -->
  <section class="seccion-foto">
    <img src="https://drive.google.com/thumbnail?id=1zIuqOKeQ0y1ocQ4E5SNzFfdL3eAg61Ve&sz=w1600" alt="Foto"/>
  </section>

  <!-- 3. CALENDARIO + FONDO ANIMADO -->
  <section class="seccion-animada">
    <img class="fondo-video" src="fondo animado.webp" alt="fondo"/>
    <div class="fondo-overlay"></div>
    <div class="contenido-seccion">
      <img class="img-contenido" src="https://drive.google.com/thumbnail?id=1S1QOyR9Ems6_wVR7_bhOvW3WxUS3PqHl&sz=w1200" alt="Calendario"/>
    </div>
  </section>

  <!-- 4. FOTOGRAFÍA -->
  <section class="seccion-foto">
    <img src="https://drive.google.com/thumbnail?id=19l0Ie4820kLOEBE-OLH4ZIwhPxBlgP27&sz=w1600" alt="Foto"/>
  </section>

  <!-- 5. ITINERARIO + FONDO ANIMADO -->
  <section class="seccion-animada">
    <img class="fondo-video" src="fondo animado.webp" alt="fondo"/>
    <div class="fondo-overlay"></div>
    <div class="contenido-seccion">
      <img class="img-contenido" src="https://drive.google.com/thumbnail?id=1RqA2i6-guqUgvoiCkGPhXTavNgpmXF7G&sz=w1200" alt="Itinerario"/>
    </div>
  </section>

  <!-- 6. FOTOGRAFÍA -->
  <section class="seccion-foto">
    <img src="https://drive.google.com/thumbnail?id=1ltdcYnfUSad68kZ0fP5o7n1ybuOYBKp_&sz=w1600" alt="Foto"/>
  </section>

  <!-- 7. INFORMACIÓN GENERAL + FONDO ANIMADO -->
  <section class="seccion-animada">
	<img class="fondo-video" src="fondo animado.webp" alt="fondo"/>
    <div class="fondo-overlay"></div>
    <div class="contenido-seccion">
      <img class="img-contenido" src="https://drive.google.com/thumbnail?id=17z3yds60i0cfqnauZX8Iki01JnFTlApD&sz=w1200" alt="Información General"/>
    </div>
  </section>
	
 <!-- BOTÓN CONFIRMACIÓN -->
<section id="confirmacion">
	<h2 class="conf-titulo">Porfavor confirmar asistencia hasta el 30 de mayo.</h2>
  <a href="https://wa.link/2241a8" target="_blank" id="btn-confirmar">
    CONFIRMAR ASISTENCIA
  </a>
</section>

  <!-- 8. CUENTA REGRESIVA -->
  <section id="countdown">
    <h2 class="cd-titulo">XV Años de SARITA</h2>
    <p class="cd-fecha">13 · Junio · 2026</p>
	<p class="cd-ornamento">Faltan</p>
    <div class="cd-grid" id="cd-grid">
      <div class="cd-bloque">
        <span class="cd-numero" id="cd-dias">00</span>
        <span class="cd-label">Días</span>
      </div>
      <span class="cd-sep">:</span>
      <div class="cd-bloque">
        <span class="cd-numero" id="cd-horas">00</span>
        <span class="cd-label">Horas</span>
      </div>
      <span class="cd-sep">:</span>
      <div class="cd-bloque">
        <span class="cd-numero" id="cd-min">00</span>
        <span class="cd-label">Minutos</span>
      </div>
      <span class="cd-sep">:</span>
      <div class="cd-bloque">
        <span class="cd-numero" id="cd-seg">00</span>
        <span class="cd-label">Segundos</span>
      </div>
    </div>
  </section>

  <!-- 9. SLIDESHOW -->
  <section id="slideshow">
    <div class="slide-wrap">
      <img class="slide-img activa" id="slide-0"
        src="https://drive.google.com/thumbnail?id=1K00cdRmvikg8oAcwsbLFZGOYg2plfMxY&sz=w1200" alt="Foto 1"/>
      <img class="slide-img" id="slide-1"
        src="https://drive.google.com/thumbnail?id=1eYiLB1gQ5xzrHvTFxbrKcwifh_LDvTwT&sz=w1200" alt="Foto 2"/>
    </div>
    <div class="slide-dots">
      <button class="slide-dot activo" onclick="irSlide(0)"></button>
      <button class="slide-dot" onclick="irSlide(1)"></button>
    </div>
  </section>

</div><!-- /contenido -->

<!-- Audio -->
<audio id="player"
  src="harrypotter.mp3"
  loop></audio>

<!-- Botón flotante música -->
<button id="audio-btn" onclick="toggleAudio()" title="Música">♪</button>

<script>
  /* ── APERTURA ── */
  function abrirInvitacion() {
    var cortina   = document.getElementById('cortina');
    var pre       = document.getElementById('pre-pantalla');
    var contenido = document.getElementById('contenido');
    var audio     = document.getElementById('player');
    var audioBtn  = document.getElementById('audio-btn');

    audio.play().catch(function(){});
    cortina.classList.add('activa');

    setTimeout(function() {
      pre.classList.add('oculta');
      contenido.classList.add('visible');
      audioBtn.classList.add('visible');
      cortina.classList.remove('activa');
    }, 700);
  }

  /* ── AUDIO TOGGLE ── */
  var audioActivo = true;
  function toggleAudio() {
    var audio = document.getElementById('player');
    var btn   = document.getElementById('audio-btn');
    if (audioActivo) {
      audio.pause();
      btn.textContent = '♩';
      btn.style.opacity = '0.35';
    } else {
      audio.play();
      btn.textContent = '♪';
      btn.style.opacity = '1';
    }
    audioActivo = !audioActivo;
  }

  /* ── CUENTA REGRESIVA ── */
  function tick() {
    var ahora    = new Date();
    var objetivo = new Date('2026-06-13T00:00:00');
    var diff     = objetivo - ahora;

    if (diff <= 0) {
      document.getElementById('cd-grid').innerHTML =
        '<p class="cd-terminado">¡El gran día ha llegado! 🎉</p>';
      return;
    }

    var d = Math.floor(diff / 86400000);
    var h = Math.floor((diff % 86400000) / 3600000);
    var m = Math.floor((diff % 3600000) / 60000);
    var s = Math.floor((diff % 60000) / 1000);

    document.getElementById('cd-dias').textContent  = String(d).padStart(2,'0');
    document.getElementById('cd-horas').textContent = String(h).padStart(2,'0');
    document.getElementById('cd-min').textContent   = String(m).padStart(2,'0');
    document.getElementById('cd-seg').textContent   = String(s).padStart(2,'0');
  }
  tick();
  setInterval(tick, 1000);

  /* ── SLIDESHOW ── */
  var slideActual = 0;
  var totalSlides = 2;
  var timerSlide;

  function irSlide(n) {
    document.getElementById('slide-' + slideActual).classList.remove('activa');
    document.querySelectorAll('.slide-dot')[slideActual].classList.remove('activo');
    slideActual = n;
    document.getElementById('slide-' + slideActual).classList.add('activa');
    document.querySelectorAll('.slide-dot')[slideActual].classList.add('activo');
    clearInterval(timerSlide);
    timerSlide = setInterval(function(){ irSlide((slideActual+1)%totalSlides); }, 4500);
  }

  timerSlide = setInterval(function(){ irSlide((slideActual+1)%totalSlides); }, 4500);
</script>

</body>
  
</html>
